name: "Post Clang-Tidy Results"
description: "Consolidates Clang-Tidy artifacts and posts PR comments."
inputs:
  build-path:
    description: "Path where build artifacts are located"
    required: true
  pr-number:
    description: "PR number for posting comments"
    required: false
  post-summary:
    description: "Whether to post a summary comment (true/false)"
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Download artifacts
      uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
      with:
        pattern: clang-tidy-*
        merge-multiple: true
      continue-on-error: true

    - name: Check if artifacts exist
      id: check
      shell: bash
      env:
        INPUT_BUILD_PATH: ${{ inputs.build-path }}
      run: |
        if [ -f "${INPUT_BUILD_PATH}/clang-tidy-fixes.yaml" ]; then
          echo "has_fixes=true" >> "$GITHUB_OUTPUT"
        else
          echo "has_fixes=false" >> "$GITHUB_OUTPUT"
        fi
        if [ -f "${INPUT_BUILD_PATH}/clang-tidy-fixes.yaml" ] || \
           [ -f "${INPUT_BUILD_PATH}/clang-tidy-new-issues.txt" ]; then
          echo "has_summary_content=true" >> "$GITHUB_OUTPUT"
        else
          echo "has_summary_content=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Post inline comments
      if: steps.check.outputs.has_fixes == 'true' && inputs.pr-number != ''
      continue-on-error: true # platisd/clang-tidy-pr-comments exits non-zero when issues are found; that is informational, not a CI failure
      uses: platisd/clang-tidy-pr-comments@28cfb84edafa771c044bde7e4a2a3fae57463818 # v1.8.0
      with:
        clang_tidy_fixes: ${{ inputs.build-path }}/clang-tidy-fixes.yaml
        github_token: ${{ github.token }}
        pull_request_id: ${{ inputs.pr-number }}

    - name: Post summary comment
      if: steps.check.outputs.has_summary_content == 'true' && inputs.post-summary == 'true' && inputs.pr-number != ''
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
      env:
        INPUT_BUILD_PATH: ${{ inputs.build-path }}
        INPUT_PR_NUMBER: ${{ inputs.pr-number }}
      with:
        script: |
          const fs = require('fs');
          const fixesFile = `${process.env.INPUT_BUILD_PATH}/clang-tidy-fixes.yaml`;
          const newIssuesFile = `${process.env.INPUT_BUILD_PATH}/clang-tidy-new-issues.txt`;

          let totalIssues = 0;
          const checkCounts = {};
          let newIssueLines = [];

          if (fs.existsSync(fixesFile)) {
            try {
              const content = fs.readFileSync(fixesFile, 'utf8');
              const matches = content.matchAll(/^\s*DiagnosticName:\s+(\S.+?)$/gm);
              for (const match of matches) {
                const name = match[1].trim();
                checkCounts[name] = (checkCounts[name] || 0) + 1;
                totalIssues++;
              }
            } catch (e) { console.log(e); }
          }

          if (fs.existsSync(newIssuesFile)) {
            try {
              const content = fs.readFileSync(newIssuesFile, 'utf8').trim();
              if (content) {
                newIssueLines = content.split('\n').filter(l => l.trim());
              }
            } catch (e) { console.log(e); }
          }

          const hasNewIssues = newIssueLines.length > 0;

          if (totalIssues > 0 || hasNewIssues) {
            let body = '## Clang-Tidy Check Results\n\n';

            if (hasNewIssues) {
              body += `**${newIssueLines.length} new issue(s) introduced by this patch** (${totalIssues} total).\n\n`;
              body += '### New issues on modified lines:\n\n';
              newIssueLines.forEach(line => { body += `- \`${line}\`\n`; });
              body += '\n';
            } else {
              body += `Found ${totalIssues} issue(s); none are newly introduced by this patch.\n\n`;
            }

            if (Object.keys(checkCounts).length > 0) {
              const sorted = Object.entries(checkCounts).sort((a, b) => b[1] - a[1]);
              body += '### All issues by check:\n\n';
              sorted.forEach(([check, count]) => { body += `- **${check}**: ${count}\n`; });
              body += '\n';
            }

            body += 'See inline comments for details. Comment `@phlexbot tidy-fix` to auto-fix.';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt(process.env.INPUT_PR_NUMBER, 10),
              body: body
            });
          }
