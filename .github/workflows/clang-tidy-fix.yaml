name: Clang-Tidy Fix
"run-name": "${{ github.actor }} fixing C++ code with clang-tidy"

"on":
  issue_comment:
    types:
      - created
  workflow_dispatch:
    inputs:
      ref:
        description:
          "The branch name to checkout and push fixes to (must be a branch, not a commit SHA). Defaults to the
          repository's default branch."
        required: false
        type: string
      tidy-checks:
        description: "A comma-separated list of clang-tidy checks to apply."
        required: false
        type: string

permissions:
  pull-requests: write
  contents: write
  issues: write

jobs:
  setup:
    runs-on: ubuntu-latest
    name: Parse command
    if: >
      github.event_name == 'workflow_dispatch' || (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        contains(fromJSON('["OWNER", "COLLABORATOR", "MEMBER"]'), github.event.comment.author_association) &&
        startsWith(github.event.comment.body, format('@{0}bot tidy-fix', github.event.repository.name))
      )
    # Authorization: Only OWNER, COLLABORATOR, or MEMBER can trigger via comments.
    # This covers repo owners, invited collaborators, and all org members.
    outputs:
      ref: ${{ steps.setup.outputs.ref }}
      repo: ${{ steps.setup.outputs.repo }}
      checkout_path: ${{ steps.setup.outputs.checkout_path }}
      build_path: ${{ steps.setup.outputs.build_path }}
      pr_number: ${{ steps.setup.outputs.pr_number }}
      tidy_checks:
        ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tidy-checks ||
        steps.parse_comment.outputs.tidy_checks }}
    steps:
      - id: parse_comment
        name: Parse comment for tidy checks
        if: github.event_name == 'issue_comment'
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          bot_name="${REPO_NAME}bot"
          checks_line=$(echo "$COMMENT_BODY" |
            sed -nE "s/^@${bot_name}[[:space:]]+tidy-fix[[:space:]]+(.*)/\1/p" | tr -d '\r')
          if [ -n "$checks_line" ]; then
            tidy_checks="$(echo "$checks_line" | tr ',' ' ' | xargs -n1 | paste -sd, -)"
            echo "tidy_checks=$tidy_checks" >> "$GITHUB_OUTPUT"
          fi
      - name: Workflow setup
        id: setup
        uses: Framework-R-D/phlex/.github/actions/workflow-setup@main
        with:
          mode: fix

  apply_tidy_fixes:
    runs-on: ubuntu-24.04
    name: Apply clang-tidy fixes
    needs: setup
    if: ${{ needs.setup.result == 'success' }}

    container:
      image: ghcr.io/framework-r-d/phlex-ci:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: ${{ needs.setup.outputs.checkout_path }}
          ref: ${{ needs.setup.outputs.ref }}
          repository: ${{ needs.setup.outputs.repo }}
          token: ${{ secrets.WORKFLOW_PAT }}

      - name: Try to download existing fixes from check workflow
        id: download_fixes_check
        if: needs.setup.outputs.tidy_checks == ''
        uses: dawidd6/action-download-artifact@b6e2e70617bc3265edd6dab6c906732b2f1ae151 # v21
        with:
          workflow: clang-tidy-check.yaml
          name: clang-tidy-check
          path: fixes
          branch: ${{ needs.setup.outputs.ref }}
        continue-on-error: true

      - name: Try to download existing fixes from previous fix workflow
        id: download_fixes_fix
        if: steps.download_fixes_check.outcome != 'success' && needs.setup.outputs.tidy_checks == ''
        uses: dawidd6/action-download-artifact@b6e2e70617bc3265edd6dab6c906732b2f1ae151 # v21
        with:
          workflow: clang-tidy-fix.yaml
          name: clang-tidy-fix
          path: fixes
          branch: ${{ needs.setup.outputs.ref }}
        continue-on-error: true

      - name: Apply fixes from artifact if available
        id: apply_from_artifact
        if:
          needs.setup.outputs.tidy_checks == '' && (steps.download_fixes_check.outcome == 'success' ||
          steps.download_fixes_fix.outcome == 'success')
        working-directory: ${{ needs.setup.outputs.checkout_path }}
        run: |
          # The artifact preserves the build directory prefix in its path structure.
          FIXES_FILE=""
          if [ -d "$GITHUB_WORKSPACE/fixes" ]; then
            FIXES_FILE=$(find "$GITHUB_WORKSPACE/fixes" -name "clang-tidy-fixes.yaml" | head -1)
          fi
          if [ -n "$FIXES_FILE" ]; then
            echo "Applying fixes from existing artifact..."
            . /entrypoint.sh
            FIXES_DIR="$(realpath "${FIXES_FILE%/*}")"
            clang-apply-replacements "${FIXES_DIR}" || true
            echo "applied=true" >> "$GITHUB_OUTPUT"
          else
            echo "applied=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup build environment
        if: steps.apply_from_artifact.outputs.applied != 'true'
        uses: Framework-R-D/phlex/.github/actions/setup-build-env@main
        with:
          build-path: ${{ needs.setup.outputs.build_path }}

      - name: Prepare clang-tidy options
        if: steps.apply_from_artifact.outputs.applied != 'true'
        id: prep_tidy_opts
        env:
          TIDY_CHECKS: ${{ needs.setup.outputs.tidy_checks }}
        run: |
          . /entrypoint.sh
          if [ -n "$TIDY_CHECKS" ]; then
            CHECKS_NORMALIZED=$(echo "$TIDY_CHECKS" | tr ' ' ',')
            echo "clang_tidy_checks=-*,${CHECKS_NORMALIZED}" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure CMake
        if: steps.apply_from_artifact.outputs.applied != 'true'
        uses: Framework-R-D/phlex/.github/actions/configure-cmake@main
        with:
          preset: clang-tidy
          source-path: ${{ needs.setup.outputs.checkout_path }}
          build-path: ${{ needs.setup.outputs.build_path }}

      - name: Generate clang-tidy fixes
        if: steps.apply_from_artifact.outputs.applied != 'true'
        working-directory: ${{ needs.setup.outputs.build_path }}
        env:
          TIDY_CHECKS: ${{ steps.prep_tidy_opts.outputs.clang_tidy_checks }}
          SOURCE_PATH: ${{ needs.setup.outputs.checkout_path }}
          BUILD_PATH: ${{ needs.setup.outputs.build_path }}
        run: |
          . /entrypoint.sh
          SOURCE_DIR="$GITHUB_WORKSPACE/$SOURCE_PATH"
          BUILD_DIR="$GITHUB_WORKSPACE/$BUILD_PATH"

          # run-clang-tidy merges per-TU fix YAML files into one comprehensive
          # clang-tidy-fixes.yaml.  Using CMAKE_CXX_CLANG_TIDY=..;--export-fixes=
          # in a parallel build is unsound: every clang-tidy invocation races to
          # overwrite the same output file, so only the last TU's fixes survive.
          # Path arguments restrict analysis to source files in the checkout,
          # automatically excluding build-directory generated files.
          #
          # run-clang-tidy validates the check list by calling clang-tidy from its
          # working directory; run from the source root so that clang-tidy discovers
          # the .clang-tidy config file there.
          if ! command -v run-clang-tidy >/dev/null 2>&1; then
            echo "::error::run-clang-tidy not found in PATH; cannot generate fixes"
            exit 1
          fi

          TIDY_ARGS=()
          if [ -n "$TIDY_CHECKS" ]; then
            TIDY_ARGS+=("-checks=$TIDY_CHECKS")
          fi

          cd "$SOURCE_DIR"
          run-clang-tidy \
            -p "$BUILD_DIR" \
            -export-fixes "$BUILD_DIR/clang-tidy-fixes.yaml" \
            -j "$(nproc)" \
            ${TIDY_ARGS[@]+"${TIDY_ARGS[@]}"} \
            "$SOURCE_DIR/phlex" \
            "$SOURCE_DIR/form" \
            "$SOURCE_DIR/plugins" \
            "$SOURCE_DIR/test" \
            || true

      - name: Apply clang-tidy fixes
        if: steps.apply_from_artifact.outputs.applied != 'true'
        working-directory: ${{ needs.setup.outputs.build_path }}
        run: |
          . /entrypoint.sh
          if [ -f clang-tidy-fixes.yaml ]; then
            clang-apply-replacements . || true
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: clang-tidy-fix
          path: |
            ${{ needs.setup.outputs.build_path }}/clang-tidy-fixes.yaml
          retention-days: 7
          if-no-files-found: ignore

      - name: Handle fix commit
        uses: Framework-R-D/phlex/.github/actions/handle-fix-commit@main
        with:
          tool: clang-tidy
          working-directory: ${{ needs.setup.outputs.checkout_path }}
          token: ${{ secrets.WORKFLOW_PAT }}
          pr-info-ref: ${{ needs.setup.outputs.ref }}
          pr-info-repo: ${{ needs.setup.outputs.repo }}

  report:
    needs: [setup, apply_tidy_fixes]
    if: always() && needs.setup.result == 'success' && needs.setup.outputs.pr_number != ''
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: Post Clang-Tidy results
        uses: Framework-R-D/phlex/.github/actions/post-clang-tidy-results@main
        with:
          build-path: ${{ needs.setup.outputs.build_path }}
          pr-number: ${{ needs.setup.outputs.pr_number }}

      - name: Update PR comment reactions
        uses: Framework-R-D/phlex/.github/actions/complete-pr-comment@main
        with:
          status: ${{ needs.apply_tidy_fixes.result }}
