name: Python Check
run-name: "${{ github.actor }} checking Python code"

permissions:
  contents: read
  pull-requests: read

"on":
  pull_request:
  push:
    branches: ["release/*"]
  workflow_dispatch:
    inputs:
      ref:
        description: "The branch, ref, or SHA to checkout. Defaults to the repository's default branch."
        required: false
        type: string
  workflow_call:
    inputs:
      checkout-path:
        description: "Path to check out code to"
        required: false
        type: string
      skip-relevance-check:
        description: "Bypass relevance check"
        required: false
        type: boolean
        default: false
      pr-base-sha:
        description: "Base SHA of the PR for relevance check"
        required: false
        type: string
      pr-head-sha:
        description: "Head SHA of the PR for relevance check"
        required: false
        type: string
      ref:
        description: "The branch, ref, or SHA to checkout"
        required: false
        type: string
      repo:
        description: "The repository to checkout from"
        required: false
        type: string

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      is_act: ${{ steps.setup.outputs.is_act }}
      ref: ${{ steps.setup.outputs.ref }}
      repo: ${{ steps.setup.outputs.repo }}
      base_sha: ${{ steps.setup.outputs.base_sha }}
      pr_number: ${{ steps.setup.outputs.pr_number }}
      checkout_path: ${{ steps.setup.outputs.checkout_path }}
      has_changes: ${{ steps.setup.outputs.has_changes }}
    steps:
      - name: Workflow setup
        id: setup
        uses: Framework-R-D/phlex/.github/actions/workflow-setup@main
        with:
          file-type: |
            python
            yaml
          head-ref: ${{ inputs.pr-head-sha }}
          ref: ${{ inputs.ref }}
          repo: ${{ inputs.repo }}
          pr-base-sha: ${{ inputs.pr-base-sha }}
          checkout-path: ${{ inputs.checkout-path }}

  python-check:
    needs: setup
    if: >
      always() && (
        github.event_name == 'workflow_dispatch' ||
        inputs.skip-relevance-check ||
        needs.setup.outputs.has_changes == 'true'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.setup.outputs.ref }}
          path: ${{ needs.setup.outputs.checkout_path }}
          repository: ${{ needs.setup.outputs.repo }}
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Install Python dependencies
        run: uv tool install ruff && uv tool install mypy --with types-PyYAML

      - name: Run ruff check
        id: ruff
        working-directory: ${{ needs.setup.outputs.checkout_path }}
        env:
          FORCE_COLOR: 1
        run: |
          echo "➡️ Checking Python code with ruff..."
          ruff check
        continue-on-error: true

      - name: Run MyPy check
        id: mypy
        working-directory: ${{ needs.setup.outputs.checkout_path }}
        run: |
          echo "➡️ Checking Python code with MyPy..."
          mypy --color-output .
        continue-on-error: true

      - name: Evaluate Python checks result
        if: always() && (steps.ruff.outcome != 'skipped' || steps.mypy.outcome != 'skipped')
        env:
          REPO: ${{ needs.setup.outputs.repo }}
        # yamllint disable rule:line-length
        run: |
          REPO_NAME="${REPO##*/}"
          if [ "${{ steps.ruff.outcome }}" = 'success' ] && [ "${{ steps.mypy.outcome }}" = 'success' ]; then
            echo "✅ Python checks passed."
          else
            echo "::error::Python checks failed. Comment '@${REPO_NAME}bot python-fix' on the PR to attempt auto-fix."
            exit 1
          fi
        # yamllint enable

  scripts-test:
    needs: setup
    if: >
      always() && (
        github.event_name == 'workflow_dispatch' ||
        inputs.skip-relevance-check ||
        needs.setup.outputs.has_changes == 'true'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.setup.outputs.ref }}
          path: ${{ needs.setup.outputs.checkout_path }}
          repository: ${{ needs.setup.outputs.repo }}
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Run scripts unit tests with coverage
        working-directory: ${{ needs.setup.outputs.checkout_path }}
        run: |
          echo "➡️ Running scripts/ unit tests with coverage..."
          uv run --with pytest --with PyYAML --with pytest-cov \
            pytest scripts/test/ -v \
            --cov=scripts \
            --cov-report="xml:${GITHUB_WORKSPACE}/coverage-scripts.xml" \
            --cov-report=term-missing

      - name: Upload scripts coverage to Codecov
        if: ${{ hashFiles('coverage-scripts.xml') != '' }}
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: coverage-scripts.xml
          flags: scripts
          name: phlex-scripts-coverage
          fail_ci_if_error: false
          verbose: true
          root_dir: ${{ needs.setup.outputs.checkout_path || '.' }}
          token: ${{ env.CODECOV_TOKEN }}
